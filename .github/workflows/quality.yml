name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Internal link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --include-fragments --root-dir "${{ github.workspace }}/dist" "dist"
          fail: true

      # SEO category is "off" in lighthouserc.json until launch: the site is
      # deliberately noindex pre-launch (see RUNBOOK.md), which Lighthouse's SEO
      # audit rightly penalizes. Re-enable at v1.0.
      - name: Lighthouse budgets (perf / a11y / best-practices ≥ 95)
        run: npx lhci autorun
